<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title>Scud Radio Setup</title>
    
    <style>
        body {
            background-color: yellow;
            font-family: Andale Mono;
            padding: 10vw;
            padding-top: 10px;
        }
        
        h1 {
            font-family: "Arial Black";
        }
        
        @font-face {
            font-family: "Arial Black";
            src: url("assets/Arial Black.ttf") format("truetype");
        }

        @font-face {
            font-family: "Andale Mono";
            src: url("assets/andalemono.ttf") format("truetype");}
        
        #main-content {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #main-logo {
            height: 225px;
            width: 225px;
        }
        
        form {
            background: rgba(255, 255, 255);
            border: 1px solid black;
            padding: 20px;
            justify-content: center;
            align-items: center;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
        }
        
        select, input[id="password"], input[type="submit"] {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid black;
            font-family: inherit;
            font-size: 14px;
        }
        
        input[type="submit"] {
            background-color: black;
            color: white;
            cursor: pointer;
        }
        
        input[type="submit"]:hover {
            background-color: white;
            color: black;
        }
    </style>
</head>
<body>
    <div id="main-content">
        <div class="logo-container">
            <img id="main-logo" src="assets/scudradiocenter.gif" alt="Scud Radio Center" width="auto">
        </div>
        
        <h1>CONNECT SCUD RADIO TO WIFI</h1>
        
        <form action="/submit" method="post">
            <label for="ssid">NETWORK</label>
            <select name="ssid" id="ssid" required>
                <option value="">-- Select a network --</option>
                {% for ssid in wifi_networks %}
                <option value="{{ ssid }}">{{ ssid }}</option>
                {% endfor %}
            </select>
            
            <label for="password">PASSWORD</label>
            <input name="password" id="password" placeholder="Enter WiFi password"/>
            
            <input type="submit" value="CONNECT">
        </form>
    </div>
</body>
</html>
